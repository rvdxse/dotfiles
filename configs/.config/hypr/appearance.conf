source = ~/.cache/wal/colors-hyprland.conf

general {
    gaps_in = 10
    gaps_out = 10
    gaps_workspaces = 40
    border_size = 3
    col.active_border = $color6
    col.inactive_border = rgba(00000000)
    bezier = linear, 0.0, 0.0, 1.0, 1.0
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 15
    active_opacity = 0.9
    inactive_opacity = 0.8

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
      enabled = true
      size = 6
      passes = 2
      new_optimizations = true
      ignore_opacity = true
      vibrancy = 2
      brightness = 1.25
      contrast = 1.05
      noise = 0.015
    }
}


animations {
    enabled = true

    # Animation curves
    bezier = specialWorkSwitch, 0.05, 0.7, 0.1, 1
    bezier = emphasizedAccel, 0.3, 0, 0.8, 0.15
    bezier = emphasizedDecel, 0.05, 0.7, 0.1, 1
    bezier = standard, 0.2, 0, 0, 1

    # Animation configs
    animation = layersIn, 1, 5, emphasizedDecel, slide
    animation = layersOut, 1, 4, emphasizedAccel, slide
    animation = fadeLayers, 1, 5, standard

    animation = windowsIn, 1, 5, emphasizedDecel
    animation = windowsOut, 1, 3, emphasizedAccel
    animation = windowsMove, 1, 6, standard
    animation = workspaces, 1, 5, standard

    animation = specialWorkspace, 1, 4, specialWorkSwitch, slidefadevert 15%

    animation = fade, 1, 6, standard
    animation = fadeDim, 1, 6, standard
    animation = border, 1, 6, standard
}

dwindle {
    pseudotile = true
    preserve_split = true
    smart_resizing = true
}

master {
    new_status = master
}

misc {
    disable_splash_rendering = true 
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

ecosystem {
    no_update_news = true
#    enforce_permissions = true
  }

cursor {
    inactive_timeout = 3
}


#workspace = w[tv1], gapsout:10, gapsin:10
#workspace = f[1], gapsout:10, gapsin:10
