}

windowrule {
  name = polkit-float
  match:class = ^(org.kde.polkit-kde-authentication-agent-1)$
  
  float = true
}

windowrule {
  name = onlyoffice-opacity
  match:class = ^(ONLYOFFICE)$
  
  opacity = 1.0 1.0
}

# Common popups tags
windowrule {
  name = tag-open-file
  match:initial_title = ^(Open File)$
  
  tag = +common-popups
}

windowrule {
  name = tag-choose-files
  match:title = ^(Choose Files)$
  
  tag = +common-popups
}

windowrule {
  name = tag-save-as
  match:title = ^(Save As)$
  
  tag = +common-popups
}

windowrule {
  name = tag-confirm-replace
  match:title = ^(Confirm to replace files)$
  
  tag = +common-popups
}

windowrule {
  name = tag-file-progress
  match:title = ^(File Operation Progress)$
  
  tag = +common-popups
}

windowrule {
  name = tag-xdg-gtk
  match:class = ^([Xx]dg-desktop-portal-gtk)$
  
  tag = +common-popups
}

windowrule {
  name = tag-open
  match:title = ^(Open)$
  
  tag = +common-popups
}

windowrule {
  name = tag-auth
  match:title = ^(Authentication Required)$
  
  tag = +common-popups
}

windowrule {
  name = tag-add-folder
  match:title = ^(Add Folder to Workspace)$
  
  tag = +common-popups
}

windowrule {
  name = tag-file-upload
  match:title = ^(File Upload)(.*)$
  
  tag = +common-popups
}

windowrule {
  name = tag-wallpaper
  match:title = ^(Choose wallpaper)(.*)$
  
  tag = +common-popups
}

windowrule {
  name = tag-library
  match:title = ^(Library)(.*)$
  
  tag = +common-popups
}

windowrule {
  name = tag-dialog-class
  match:class = ^(.*dialog.*)$
  
  tag = +common-popups
}

windowrule {
  name = tag-dialog-title
  match:title = ^(.*dialog.*)$
  
  tag = +common-popups
}

# Portal dialogs tags
windowrule {
  name = tag-portal-hyprland
  match:class = ^(org.freedesktop.impl.portal.desktop.hyprland)$
  
  tag = +portal-dialogs
}

windowrule {
  name = tag-portal-gtk
  match:class = ^(org.freedesktop.impl.portal.desktop.gtk)$
  
  tag = +portal-dialogs
}

windowrule {
  name = tag-portal-xdg
  match:class = ^([Xx]dg-desktop-portal-gtk)$
  
  tag = +portal-dialogs
}

# Disable border and blur for gtk apps
windowrule {
  name = xdg-noborder
  match:class = ^(Xdg-desktop-portal-gtk)$
  
  border_size = 0
  no_blur = true
}

windowrule {
  name = file-upload-noborder
  match:title = ^(File Upload)$
  
  border_size = 0
  no_blur = true
}
