#  
#  float = true
#}

windowrule {
  name = kvantum-float
  match:class = ^(kvantummanager)$
  
  float = true
}

windowrule {
  name = qt5ct-float
  match:class = ^(qt5ct)$
  
  float = true
}

windowrule {
  name = qt6ct-float
  match:class = ^(qt6ct)$
  
  float = true
}

windowrule {
  name = nwg-look-float
  match:class = ^(nwg-look)$
  
  float = true
}

windowrule {
  name = nwg-displays-float
  match:class = ^(nwg-displays)$
  
  float = true
}

windowrule {
  name = ark-float
  match:class = ^(org.kde.ark)$
  
  float = true
}

windowrule {
  name = pavucontrol-float
  match:class = ^(org.pulseaudio.pavucontrol)$
  
  float = true
}

windowrule {
  name = blueman-float
  match:class = ^(blueman-manager)$
  
  float = true
}

windowrule {
  name = nm-applet-float
  match:class = ^(nm-applet)$
  
  float = true
}

windowrule {
  name = nm-editor-float
  match:class = ^(nm-connection-editor)$
  
