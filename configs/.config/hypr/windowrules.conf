# Sizes for floating popups
windowrule {
  name = floating-size
  match:float = true
  
  size = <85% <95%
}

windowrule {
  name = common-popups-float
  match:tag = common-popups
  
  float = true
  size = <60% <90%
}

# Fix file chooser dialogs opening off-screen
windowrule {
  name = portal-dialogs-float
  match:tag = portal-dialogs
  
  float = true
  center = true
}

# Only add the Core applications here
windowrule {
  name = satty-float
  match:class = ^(com.gabm.satty)$
  
  float = true
}

windowrule {
  name = dolphin-progress-float
  match:class = ^(org.kde.dolphin)$
  match:title = ^(Progress Dialog — Dolphin)$
  
  float = true
}

windowrule {
  name = dolphin-copying-float
  match:class = ^(org.kde.dolphin)$
  match:title = ^(Copying — Dolphin)$
  
  float = true
}

windowrule {
  name = firefox-about-float
  match:title = ^(About Mozilla Firefox)$
  
  float = true
}

windowrule {
  name = firefox-focus
  match:class = ^(firefox|Firefox)$
  
  focus_on_activate = true
}

windowrule {
  name = zen-focus
  match:class = ^(zen|Zen)$

  focus_on_activate = true
}

windowrule {
  name = top-float
  match:initial_title = ^(top)$
  
  float = true
}

windowrule {
  name = btop-float
  match:initial_title = ^(btop)$
  
  float = true
}

windowrule {
  name = htop-float
  match:initial_title = ^(htop)$
  
  float = true
}

