
source = ~/.config/hypr/windowrules.conf

################
### MONITORS ###
################

monitor=,1920x1200,auto,1
#monitor = ,preferred,auto,1

###################
### MY PROGRAMS ###
###################

$terminal = kitty
$browser =  firefox
$fileManager = dolphin
$menu = rofi -show drun
$editor = code

#################
### AUTOSTART ###
#################

env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = XDG_MENU_PREFIX=arch- kbuildsycoca6
exec-once = wl-paste --type text --watch cliphist store 
exec-once = waybar
exec-once = swww-daemon --namespace default
exec-once = nm-applet --indicator &
#exec-once = dunst &
exec-once = hyprctl setcursor Bibata-Modern-Ice 24
exec-once = swayosd-server
exec-once = blueman-applet &
#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,kde
env = QT_STYLE_OVERRIDE,kvantum
#####################
### LOOK AND FEEL ###
#####################

source = ~/.cache/wal/colors-hyprland.conf
general {
    gaps_in = 0
    gaps_out = 0#20
    gaps_workspaces = 50

    border_size = 0
   col.active_border = $color10 $color11
    col.inactive_border = $color6
    bezier = linear, 0.0, 0.0, 1.0, 1.0
   resize_on_border = true

   allow_tearing = false

    layout = dwindle
}


decoration {
    rounding = 0
   # rounding_power = 2


    active_opacity = 1
    inactive_opacity = 1

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
      enabled = false
      size = 6
      passes = 2
      new_optimizations = true
      ignore_opacity = true
      vibrancy = 2
      xray = true
      brightness = 1.25
      contrast = 1.05
      noise = 0.015
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    # Default animations, see https://wiki.hypr.land/Configuring/Animations/
    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,  popin 80%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     5,  default, slide
    #animation = workspacesIn,  1,     1.21,  almostLinear, wind
    #animation = workspacesOut, 1,     1.94,  almostLinear, wind
    animation = zoomFactor,    1,     7,     quick
}

# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule = bordersize 0, floating:0, onworkspace:w[tv1]
# windowrule = rounding 0, floating:0, onworkspace:w[tv1]
# windowrule = bordersize 0, floating:0, onworkspace:f[1]
# windowrule = rounding 0, floating:0, onworkspace:f[1]
windowrulev2 = float, class:pavucontrol
windowrulev2 = center, class:pavucontrol
windowrulev2 = size 600 400, class:pavucontrol
windowrulev2 = opacity 1.0 override, title: (.*(YouTube).*)$
windowrulev2 = opacity 1.0 override, class: (.*(Boxes|ONLYOFFICE|vlc|zoom|eog|steam).*)$
#windowrulev2 = float,title:^.*(Code|VSCodium).*$
#windowrulev2 = noblur,title:^.*(Code|VSCodium).*$
#windowrulev2 = noborder,title:^.*(Code|VSCodium).*$
#windowrulev2 = opaque,title:^.*(YouTube).*$
#windowrulev2 = stayfocused,class:^(Code)$
#windowrulev2 = float,class:^(Code)$,title:^(dropdown)$
#windowrulev2 = float,class:^(Code)$,title:^(dropdown_menu)$
#windowrulev2 = float,class:^(Code)$,title:^(popup_menu)$
#windowrulev2 = float,class:^(Code)$,title:^(Picture-in-picture)$
#windowrulev2 = noborder,class:^(Code)$,title:^(Picture-in-picture)$

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    
    kb_layout = us,ru,ua
    kb_variant =
    kb_model =
    kb_options = grp:alt_shift_toggle
    kb_rules =
    force_no_accel = true
    follow_mouse = 1
    repeat_delay = 200
    repeat_rate = 40
    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
    
    touchpad {
        natural_scroll = false
    }
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace
gesture = 3, pinchin,float,tile
gesture = 3, pinchout,float, float


# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

bind = $mainMod, F11, fullscreen
bind = SUPER, R, exec, wlogout &
bind = SUPER, N, exec, md.obsidian.Obsidian
bind = SUPER, O, setprop, active opaque toggle
# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, V, exec, cliphist list | rofi -dmenu -display-columns 2 | cliphist decode | wl-copy
bind = $mainMod, T, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exec, AyuGram
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, B, exec, $browser
bind = $mainMod, C, exec, $editor
bind = $mainMod, W, togglefloating,
#bind = $mainMod, A, exec, $menu
bind = $mainMod, A, exec, rofi -show drun -theme-str '* { width: 1000px; } window { location: north; anchor: north; height: 800px; } listview { columns: 4; }'
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, G, exec, $HOME/.config/hypr/scripts/toggle_waybar
bind = , Print, exec, grimblast copy screen
bind = $mainMod, Print, exec, grimblast copy area
# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod SHIFT, T, exec, $HOME/.config/hypr/scripts/wallpaper_change
# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
binddm = $mainMod, Z, $d hold to move window , movewindow
binddm = $mainMod, X, $d hold to resize window, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, swayosd-client --output-volume +2
bindel = ,XF86AudioLowerVolume, exec, swayosd-client --output-volume -2
bindel = ,XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
bindel = ,XF86AudioMicMute, exec, swayosd-client --input-volume mute-toggle
bindel = ,XF86MonBrightnessUp, exec, swayosd-client --brightness raise
bindel = ,XF86MonBrightnessDown, exec, swayosd-client --brightness lower

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrule
# windowrule = float,class:^(kitty)$,title:^(kitty)$

# Ignore maximize requests from apps. You'll probably like this.
windowrule = suppressevent maximize, class:.*

# Fix some dragging issues with XWayland
windowrule = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0
