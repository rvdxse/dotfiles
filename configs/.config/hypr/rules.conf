windowrule {
  name = pavucontrol-float
  match:class = pavucontrol
  
  float = true
  center = true
  size = 600 400
}

windowrule {
  name = kitty-opacity
  match:class = (.*(kitty).*)$
  
  opacity = 0.8
}

windowrule {
    name = virt
    match:class = remote-viewer
    opacity = 1 override
  }
windowrule {
    name = task_manager
    match:class = taskmgr
    float = true
    size = 1200 800
    center = 1
    opacity = 0.8 override
}

windowrule {
    name = floatshee
    match:class = floatshee
    float = true
    size = 1200 800
    center = 1
    opacity = 0.8 override
}
windowrule {
  name = satty-screenshot
  match:class = com.gabm.satty
  opacity = 1 override 
  float = true
  center = true
  size = 1200 750
}
windowrule {
    name = qemu_opacity
    match:class = qemu
    opacity = 1 override
  }
windowrule {
  name = youtube-opacity-override
  match:title = (.*(YouTube).*)$
  
  opacity = 1.0 override
}

windowrule {
  name = opaque-apps
  match:class = (.*(Boxes|ONLYOFFICE|vlc|zoom|eog|steam|Clapper).*)$
  
  opacity = 1.0 override
}

windowrule {
  name = kitty-saver-fullscreen
  match:class = ^(kitty-saver)$
  
  fullscreen = true
}

# Layer rules
#layerrule = ignorealpha 0.4, waybar

layerrule {
  name = waybar-blur
  match:namespace = waybar
  
  blur = true
  ignore_alpha = 0
}

layerrule {
  name = swayosd-blur
  match:namespace = swayosd
  
  blur = true
  ignore_alpha = 0
}

layerrule {
  name = swaync-control-blur
  match:namespace = swaync-control-center
  
  blur = true
  ignore_alpha = 0
  animation = slide right
  ignore_alpha = 0.5
}

layerrule {
  name = swaync-notification-blur
  match:namespace = swaync-notification-window
  
  blur = true
  ignore_alpha = 0
  ignore_alpha = 0.5
}

layerrule {
  name = rofi-blur
  match:namespace = rofi
  
  blur = true
  ignore_alpha = 0
}

layerrule {
  name = wlogout-blur
  match:namespace = logout_dialog
  
  blur = true
  ignore_alpha = 0
}
layerrule {
    name = vicinae-blur
    blur = on
    ignore_alpha = 0
    match:namespace = vicinae
}

windowrule {
  name = suppress-maximize
  match:class = .*
  
  suppress_event = maximize
}

# Fix some dragging issues with XWayland
windowrule {
  name = xwayland-drag-fix
  match:class = ^$
  match:title = ^$
  match:xwayland = true
  match:float = true
  match:fullscreen = false
  match:pin = false
  
  no_focus = true
}



