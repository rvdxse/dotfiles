$mainMod = SUPER

bind = $mainMod, F1, submap, hide
bind = $mainMod, F1, exec, swayosd-client --custom-message "Hotkeys Disabled"
submap = hide

bind = $mainMod, F1, submap, reset
bind = $mainMod, F1, exec, swayosd-client --custom-message "Hotkeys Enabled"
submap = reset
bindd = $mainMod, equal, Zoom in, exec, hyprctl keyword cursor:zoom_factor 2.0
bindd = SUPER SHIFT, minus, Zoom reset, exec, hyprctl keyword cursor:zoom_factor 1.0
bindd = $mainMod, F11, Toggle fullscreen, fullscreen
bindd = SUPER, R, Open wlogout, exec, pgrep -x wlogout && pkill -x wlogout || wlogout
bindd = SUPER, N, Open Obsidian, exec, obsidian
bindd = SUPER, O, Toggle opaque window, setprop, active opaque toggle
bindd = SUPER_SHIFT, P, Pick color to clipboard, exec, hyprpicker -a | wl-copy && wtype -M ctrl v -m ctrl
bind = $mainMod, F, exec, hyprvoice toggle


bindd = $mainMod, V, Clipboard history, exec, cliphist list | rofi -dmenu -display-columns 2 | cliphist decode | wl-copy && wtype -M ctrl v -m ctrl
bindd = $mainMod, Return, Open terminal, exec, $terminal
bindd = $mainMod, Q, Close active window, killactive,
bindd = $mainMod, M, Open AyuGram, exec, AyuGram
bindd = $mainMod, E, Open file manager, exec, $fileManager
bindd = $mainMod, B, Open browser, exec, $browser
bindd = $mainMod, C, Open editor, exec, $editor
bindd = $mainMod, W, Toggle floating, togglefloating,
bindd = $mainMod, Space, Open app launcher, exec, $menu
bindd = $mainMod, P, Toggle pseudo tiling, pseudo,
bindd = $mainMod, J, Toggle split, layoutmsg, togglesplit
bindd = $mainMod, G, Toggle Waybar, exec, $HOME/.config/hypr/scripts/toggle_waybar
bindd = $mainMod, A, Open Claude, exec, open-webapp https://claude.ai
bindd = $mainMod, Y, Open YouTube, exec, open-webapp https://youtube.com
bindd = $mainMod, D, Open Lazydocker, exec, $terminal -e lazydocker
bindd = $mainMod, S, Toggle scratchpad, togglespecialworkspace, magic
bind = $mainMod, S, movetoworkspace, +0
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod, S, movetoworkspace, special:magic
bind = $mainMod, S, togglespecialworkspace, magic

bindd = , Print, Screenshot screen, exec, grimblast copy screen
bindd = $mainMod, Print, Screenshot with annotation, exec, grim -t ppm - | satty --filename - --output-filename ~/Pictures/Screenshots/$(date +'%Y%m%d-%H%M:%S').png --copy-command "wl-copy"

# Move focus
bindd = $mainMod, left, Focus left, movefocus, l
bindd = $mainMod, right, Focus right, movefocus, r
bindd = $mainMod, up, Focus up, movefocus, u
bindd = $mainMod, down, Focus down, movefocus, d

# Switch workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bindd = $mainMod SHIFT, T, Change wallpaper, exec, $HOME/.config/hypr/scripts/wallpaper_change
bindd = $mainMod SHIFT, N, Toggle notification center, exec, swaync-client -t -sw

# Move window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bindd = CONTROL SHIFT, Escape, Open task manager, exec, $terminal --class taskmgr -e btop

# Scroll workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize (mouse)
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
binddm = $mainMod, Z, Hold to move window, movewindow
binddm = $mainMod, X, Hold to resize window, resizewindow

# Volume
bindel = ,XF86AudioRaiseVolume, exec, swayosd-client --output-volume +2
bindel = ,XF86AudioLowerVolume, exec, swayosd-client --output-volume -2
bindel = ,XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
bindel = ,XF86AudioMicMute, exec, pamixer --default-source -t
bindel = ,XF86MonBrightnessUp, exec, swayosd-client --brightness raise
bindel = ,XF86MonBrightnessDown, exec, swayosd-client --brightness lower

# Media
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
